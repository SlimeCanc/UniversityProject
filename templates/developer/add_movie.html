{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h2>➕ Добавить новый фильм</h2>

        <form method="POST" class="movie-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="title">Название *</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="year">Год выпуска *</label>
                    <input type="number" id="year" name="year" min="1900" max="2030" required>
                </div>

                <div class="form-group">
                    <label for="genre">Жанр *</label>
                    <input type="text" id="genre" name="genre" required>
                </div>

                <div class="form-group">
                    <label for="rating">Рейтинг *</label>
                    <input type="number" id="rating" name="rating" step="0.1" min="0" max="10" required>
                </div>

                <div class="form-group">
                    <label for="type">Тип *</label>
                    <select id="type" name="type" required>
                        <option value="movie">Фильм</option>
                        <option value="series">Сериал</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="duration">Продолжительность</label>
                    <input type="text" id="duration" name="duration">
                </div>
            </div>

            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="image_url">URL изображения</label>
                <input type="url" id="image_url" name="image_url">
            </div>

            <div class="platforms-section">
                <h3>📡 Доступность на платформах</h3>
                <div class="platforms-checkboxes">
                    <label class="checkbox-label">
                        <input type="checkbox" name="netflix_available" value="1">
                        <span>Netflix</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="amazon_available" value="1">
                        <span>Amazon Prime</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="disney_available" value="1">
                        <span>Disney+</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="hbo_available" value="1">
                        <span>HBO Max</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="apple_available" value="1">
                        <span>Apple TV+</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="hulu_available" value="1">
                        <span>Hulu</span>
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Добавить фильм</button>
                <a href="{{ url_for('developer.movies_list') }}" class="btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
